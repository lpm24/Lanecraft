<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Lanecraft</title>
  <meta name="description" content="Fantasy RTS with 9 races — build, battle, and conquer in 1v1 through 4v4 matches" />
  <meta name="theme-color" content="#1a1a2e" />

  <!-- Open Graph -->
  <meta property="og:title" content="Lanecraft" />
  <meta property="og:description" content="Fantasy RTS with 9 races — build, battle, and conquer in 1v1 through 4v4 matches" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://krool.github.io/SpawnWars/icons/icon-512.png" />

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="64x64" href="/icons/favicon-64.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0a; overscroll-behavior: none; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; position: fixed; inset: 0; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
    #loading-overlay {
      position: fixed; inset: 0;
      background: #0a0a0a;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
      z-index: 100;
      transition: opacity 0.5s ease-out;
    }
    #loading-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loader {
      width: 48px; height: 48px;
      border: 4px solid rgba(255,215,0,0.2);
      border-top-color: #ffd700;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading-bar-track {
      width: 180px; height: 6px;
      background: rgba(255,215,0,0.15);
      border-radius: 3px;
      overflow: hidden;
    }
    #loading-bar-fill {
      width: 0%; height: 100%;
      background: #ffd700;
      border-radius: 3px;
      transition: width 0.15s ease-out;
    }
    #loading-text {
      color: rgba(255,215,0,0.5);
      font: 12px/1 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error-overlay {
      display: none; position: fixed; inset: 0;
      background: #0a0a0a;
      z-index: 200;
      flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      text-align: center; padding: 2rem;
    }
    #error-overlay h2 { color: #ffd700; font-size: 1.3rem; }
    #error-overlay p { font-size: 0.9rem; color: #aaa; max-width: 400px; }
    #error-overlay button {
      margin-top: 8px; padding: 10px 28px;
      background: #ffd700; color: #0a0a0a; border: none; border-radius: 6px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }
    #error-overlay button:hover { background: #ffed4a; }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="loader"></div>
    <div id="loading-bar-track"><div id="loading-bar-fill"></div></div>
    <div id="loading-text">Loading...</div>
  </div>
  <div id="error-overlay">
    <h2>Something went wrong</h2>
    <p id="error-message">An unexpected error occurred.</p>
    <button onclick="location.reload()">Reload</button>
  </div>
  <canvas id="game"></canvas>
  <script>
    // Global error handling — show crash overlay instead of blank screen
    (function() {
      var shown = false;
      function showError(msg) {
        if (shown) return;
        shown = true;
        var overlay = document.getElementById('error-overlay');
        var text = document.getElementById('error-message');
        if (overlay) { overlay.style.display = 'flex'; }
        if (text && msg) { text.textContent = msg; }
        var loading = document.getElementById('loading-overlay');
        if (loading) { loading.style.display = 'none'; }
      }
      window.onerror = function(message) {
        showError(String(message));
      };
      window.addEventListener('unhandledrejection', function(e) {
        showError(e.reason ? String(e.reason) : 'An unexpected error occurred.');
      });
      window.__showError = showError;
    })();
  </script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
