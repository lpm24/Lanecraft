name: Deploy notification

on:
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Discord deploy notification
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          AUTHOR: ${{ github.actor }}
          DEPLOY_URL: https://lanecraft-i3l.pages.dev
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          # Find the SHA of the previous successful notification (exclude current run)
          LAST_GOOD_SHA=$(gh run list --workflow=deploy-notify.yml --status=success --json databaseId,headSha \
            --jq "[.[] | select(.databaseId != $RUN_ID)] | .[0].headSha // empty" 2>/dev/null || true)
          # Fall back to fetch-depth range if no prior run found
          if [ -n "$LAST_GOOD_SHA" ] && git cat-file -t "$LAST_GOOD_SHA" >/dev/null 2>&1; then
            RANGE="${LAST_GOOD_SHA}..${SHA}"
          else
            RANGE="-5"
          fi
          DESCFILE=$(mktemp)
          echo "**Changes since last deploy:**" > "$DESCFILE"
          git log --oneline --no-decorate $RANGE | while IFS= read -r line; do
            HASH=$(echo "$line" | cut -d' ' -f1)
            MSG=$(echo "$line" | cut -d' ' -f2-)
            echo "- [$HASH](https://github.com/$REPO/commit/$HASH) $MSG" >> "$DESCFILE"
          done
          PAYLOAD=$(jq -n \
            --rawfile desc "$DESCFILE" \
            --arg title "Lanecraft Deployed" \
            --arg url "$DEPLOY_URL" \
            --arg footer "Deployed by $AUTHOR via Cloudflare Pages" \
            '{embeds: [{title: $title, description: ($desc | rtrimstr("\n")), url: $url, color: 5763719, footer: {text: $footer}}]}')
          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK"
