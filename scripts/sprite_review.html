<head>
<meta charset="UTF-8">
<title>Lanecraft - Building Sprite Review</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif; padding: 20px; }
  h1 { text-align: center; margin-bottom: 10px; color: #e6c866; }
  .subtitle { text-align: center; color: #888; margin-bottom: 30px; }

  .race-section { margin-bottom: 40px; border: 1px solid #333; border-radius: 8px; padding: 20px; background: #16213e; }
  .race-header { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
  .race-desc { color: #aaa; font-size: 13px; margin-bottom: 15px; }

  .building-row { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .building-label { width: 180px; flex-shrink: 0; display: flex; gap: 8px; align-items: flex-start; }
  .unit-thumb { width: 60px; height: 60px; flex-shrink: 0; border: 1px solid #444; border-radius: 4px; background: #0d1117; object-fit: contain; image-rendering: pixelated; }
  .unit-thumb:hover { transform: scale(2.5); position: relative; z-index: 10; border-color: #e6c866; }
  .building-info { flex: 1; }
  .building-label .type { font-weight: bold; font-size: 14px; }
  .building-label .name { font-size: 11px; color: #aaa; }
  .building-label .units { font-size: 10px; color: #6a9; margin-top: 2px; }

  .node-slots { display: flex; gap: 6px; flex-wrap: wrap; }
  .node-slot { text-align: center; width: 90px; }
  .node-slot img { width: 80px; height: 100px; object-fit: contain; border: 2px solid #333; border-radius: 4px; background: #0d1117; cursor: pointer; }
  .node-slot img:hover { border-color: #e6c866; transform: scale(2.5); position: relative; z-index: 10; }
  .node-slot img.missing { border-color: #c44; opacity: 0.4; }
  .node-slot img.inherited { border-color: #c80; }
  .node-slot .node-label { font-size: 10px; color: #888; margin-top: 2px; }
  .node-slot .node-name { font-size: 9px; color: #6a9; }
  .node-slot .status { font-size: 9px; font-weight: bold; }
  .node-slot .status.unique { color: #4c8; }
  .node-slot .status.inherited { color: #c80; }
  .node-slot .status.missing { color: #c44; }

  .legend { display: flex; gap: 20px; justify-content: center; margin-bottom: 20px; font-size: 13px; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend .dot { width: 12px; height: 12px; border-radius: 2px; border: 2px solid; }
  .dot.unique { border-color: #4c8; background: #1a3a2a; }
  .dot.inherited { border-color: #c80; background: #3a2a1a; }
  .dot.missing { border-color: #c44; background: #3a1a1a; }

  .pack-ref { display: flex; gap: 10px; margin-bottom: 30px; padding: 15px; background: #0d1117; border-radius: 8px; flex-wrap: wrap; }
  .pack-ref h3 { width: 100%; color: #e6c866; margin-bottom: 5px; }
  .pack-thumb { text-align: center; }
  .pack-thumb img { width: 60px; height: 75px; object-fit: contain; }
  .pack-thumb .num { font-size: 9px; color: #888; }

  .stats { text-align: center; margin-bottom: 20px; padding: 10px; background: #0d1117; border-radius: 8px; }
  .stats span { margin: 0 15px; }
  .stats .count { font-weight: bold; font-size: 18px; }
</style>
</head>

// Count stats and render
let totalUnique = 0, totalInherited = 0, totalMissing = 0;
const container = document.getElementById('content');
let html = '';

for (const [raceId, race] of Object.entries(RACES)) {
  html += `<div class="race-section">`;
  html += `<div class="race-header" style="color:${race.colors}">${race.name}</div>`;
  html += `<div class="race-desc">${race.desc} — Pack: ${PACKS[race.pack].name}</div>`;

  for (const [bldgType, bldg] of Object.entries(race.buildings)) {
    html += `<div class="building-row">`;
    html += `<div class="building-label">`;
    // Show unit sprite thumbnail for melee/ranged/caster (not tower/hut)
    const unitSprite = UNIT_SPRITES[raceId]?.[bldgType];
    if (unitSprite) {
      html += `<img class="unit-thumb" src="${unitSprite}" title="${race.name} ${bldgType} unit" onerror="this.style.display='none'">`;
    }
    html += `<div class="building-info">`;
    html += `<div class="type">${bldgType.toUpperCase()} (${bldg.suffix})</div>`;
    html += `<div class="units">${bldg.units}</div>`;
    html += `</div></div>`;
    html += `<div class="node-slots">`;

    for (const [node, info] of Object.entries(bldg.nodes)) {
      const statusClass = info.status;
      if (info.status === 'unique') totalUnique++;
      else if (info.status === 'inherited') totalInherited++;
      else totalMissing++;

      const imgSrc = info.sprite || (info.inherits && bldg.nodes[info.inherits]?.sprite) || '';
      const imgClass = info.status === 'missing' ? 'missing' : info.status === 'inherited' ? 'inherited' : '';

      html += `<div class="node-slot">`;
      if (imgSrc) {
        html += `<img src="${imgSrc}" class="${imgClass}" title="${info.name}" onerror="this.style.display='none'">`;
      } else {
        html += `<div style="width:80px;height:100px;border:2px dashed #c44;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#c44;">NEED</div>`;
      }
      html += `<div class="node-label">Node ${node}</div>`;
      html += `<div class="node-name">${info.name}</div>`;
      html += `<div class="status ${statusClass}">${info.status.toUpperCase()}${info.inherits ? ' ←' + info.inherits : ''}</div>`;
      html += `</div>`;
    }

    html += `</div></div>`;
  }

  html += `</div>`;
}

container.innerHTML = html;
document.getElementById('stats').innerHTML =
  `<span class="count" style="color:#4c8">${totalUnique}</span> unique · ` +
  `<span class="count" style="color:#c80">${totalInherited}</span> inherited · ` +
  `<span class="count" style="color:#c44">${totalMissing}</span> need generation`;
</script>
